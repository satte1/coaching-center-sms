{% extends 'base.html' %}

                <div class="card-body">
                    <h5 class="card-title">👨‍🎓 Students</h5>
                    <p class="card-text">Saare students dekho aur manage karo</p>

                </div>
            </div>
        </div>

        <div class="col-md-4">

                    <a href="/fees" class="btn btn-light">Open</a>
                </div>

        </div>

        <div class="col-md-4">
            <div class="card text-white bg-warning mb-3">
                <div class="card-body">
                    <h5 class="card-title">📋 Attendance</h5>
