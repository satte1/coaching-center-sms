{% extends 'base.html' %}

{% block title %}Add Student{% endblock %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>👨‍🎓 Add New Student</h2>
        <a href="/students" class="btn btn-secondary">← Back</a>
    </div>

    <div class="card mt-3">
        <div class="card-body">
            <form method="POST" action="/students/add">
                
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="full_name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Course</label>
                    <select name="course" class="form-select" required>
                        <option value="">-- Select Course --</option>
                        <option value="Data Science">Data Science</option>
                        <option value="Fullstack">Fullstack</option>
                        <option value="Salesforce">Salesforce</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Batch Select karo</label>
                    <select name="batch_id" class="form-select" required id="batchSelect">
                        <option value="">-- Select Batch --</option>
                        {% for batch in batches %}
                        <option value="{{ batch[0] }}" data-name="{{ batch[1] }}">
                            {{ batch[1] }} — {{ batch[2] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Batch Name</label>
                    <input type="text" name="batch_name" class="form-control" 
                           id="batchName" readonly required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Joining Date</label>
                    <input type="date" name="joining_date" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary">Add Student</button>
                <a href="/students" class="btn btn-secondary">Cancel</a>

            </form>
        </div>
    </div>

    <script>
    document.getElementById('batchSelect').addEventListener('change', function() {
        const selected = this.options[this.selectedIndex];
        document.getElementById('batchName').value = selected.dataset.name || '';
    });
    </script>

{% endblock %}
